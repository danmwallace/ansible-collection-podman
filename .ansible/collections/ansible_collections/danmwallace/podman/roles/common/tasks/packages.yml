---
- name: Install Podman and base packages
  ansible.builtin.dnf:
    name:
      - podman
      - buildah
      - skopeo
      - python3-podman
      - container-selinux
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install qemu-guest-agent on KVM guests
  ansible.builtin.dnf:
    name: qemu-guest-agent
    state: present
  become: true
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - ansible_facts['virtualization_type'] is defined
    - ansible_facts['virtualization_type'] == 'kvm'
