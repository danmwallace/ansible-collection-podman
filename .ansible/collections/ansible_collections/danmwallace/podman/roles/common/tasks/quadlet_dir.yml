---
- name: Ensure systemd Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Enable and start rootful podman.socket
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started
  become: true
  when: ansible_facts['distribution'] == 'Fedora'
