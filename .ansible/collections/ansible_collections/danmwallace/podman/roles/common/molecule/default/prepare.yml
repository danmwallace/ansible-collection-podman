---
- name: Prepare molecule instance
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Update apt cache
      ansible.builtin.raw: apt-get update -qq
      changed_when: false

    - name: Install Python3 and sudo
      ansible.builtin.raw: apt-get install -y -qq python3 sudo
      changed_when: false

    - name: Start D-Bus (required by hostname and systemd tasks)
      ansible.builtin.raw: systemctl start dbus.socket dbus.service
      failed_when: false
      changed_when: false
