# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Base Fedora Server configuration for Podman homelab hosts
    description:
      - Installs and configures Podman, firewalld, SELinux, system users,
        qemu-guest-agent, optional Cockpit, and the systemd Quadlet directory.
      - Fedora Server only — Atomic variants (IoT, CoreOS, Silverblue, Kinoite) are not supported.
    options:
      common_timezone:
        type: str
        default: "America/New_York"
        description: Timezone to set on the host (passed to community.general.timezone).
      common_cockpit_enabled:
        type: bool
        default: false
        description: Whether to install and enable Cockpit and cockpit-podman.
      common_users:
        type: list
        elements: dict
        default:
          - name: ansible
            groups:
              - wheel
          - name: dwallace
            groups:
              - wheel
        description: >
          List of users to create. Each entry requires 'name' (str) and
          'groups' (list of str). SSH public keys are read from
          ~/.ssh/id_ed25519.pub on the controller per user name.
        options:
          name:
            type: str
            required: true
            description: Username to create.
          groups:
            type: list
            elements: str
            required: true
            description: Supplementary groups for the user.
