---
- name: Ensure uptime-kuma data directory exists
  ansible.builtin.file:
    path: "{{ uptime_kuma_data_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Deploy uptime-kuma Quadlet container unit
  ansible.builtin.template:
    src: uptime-kuma.container.j2
    dest: /etc/containers/systemd/uptime-kuma.container
    mode: "0644"
  become: true
  notify: Restart uptime-kuma

- name: Enable and start uptime-kuma.service
  ansible.builtin.systemd:
    name: uptime-kuma.service
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags: [molecule-notest]
