---
- name: Restart uptime-kuma
  ansible.builtin.systemd:
    name: uptime-kuma.service
    state: restarted
    daemon_reload: true
  become: true
  tags: [molecule-notest]
  register: _uptime_kuma_restart_result
  # "Could not find the requested service" fires in Molecule because the
  # Quadlet unit isn't loaded (daemon-reload is molecule-notest). Suppress
  # that specific error so Molecule passes; any other failure still surfaces.
  failed_when:
    - _uptime_kuma_restart_result is failed
    - "'Could not find the requested service' not in (_uptime_kuma_restart_result.msg | default(''))"
