---
- name: Prepare molecule instance
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Install Python 3 and sudo
      ansible.builtin.raw: dnf install -y python3 sudo
      changed_when: false

    - name: Ensure /etc/containers/systemd exists
      ansible.builtin.file:
        path: /etc/containers/systemd
        state: directory
        mode: "0755"
