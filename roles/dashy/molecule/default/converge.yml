---
- name: Converge
  hosts: molecule
  gather_facts: true
  tasks:
    - name: Apply dashy role with test values
      ansible.builtin.include_role:
        name: danmwallace.podman.dashy
      vars:
        dashy_hostname: home.test.local
        it_tools_hostname: tools.test.local
        semaphore_hostname: semaphore.test.local
        arcane_hostname: arcane.test.local
        traefik_hostname: trfk.test.local
        dashy_librechat_hostname: ai.test.local
        dashy_n8n_hostname: agents.test.local
        dashy_hermes_gateway_ai01_hostname: hermes-ai01.test.local
        dashy_hermes_gateway_aimaster_hostname: hermes-master.test.local
        dashy_portfolio_hostname: portfolio.test.local
        dashy_wsb_hostname: wsb.test.local
        dashy_traefik_ai01_hostname: trfk-ai01.test.local
        dashy_traefik_aimaster_hostname: trfk-master.test.local
