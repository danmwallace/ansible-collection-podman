---
- name: Ensure dashy data directory exists
  ansible.builtin.file:
    path: "{{ dashy_data_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Deploy dashy config file
  ansible.builtin.template:
    src: dashy-config.yml.j2
    dest: "{{ dashy_data_dir }}/config.yml"
    mode: "0644"
  become: true
  notify: Restart dashy

- name: Deploy dashy Quadlet container unit
  ansible.builtin.template:
    src: dashy.container.j2
    dest: /etc/containers/systemd/dashy.container
    mode: "0644"
  become: true
  notify: Restart dashy

- name: Enable and start dashy.service
  ansible.builtin.systemd:
    name: dashy.service
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags: [molecule-notest]
