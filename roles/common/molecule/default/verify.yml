---
- name: Verify
  hosts: molecule
  gather_facts: true
  tasks:
    - name: Assert role ran without errors on non-Fedora host
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] != 'Fedora'
        msg: "This smoke-test scenario is for non-Fedora hosts only; use the 'fedora' scenario on Fedora"
