---
- name: Verify
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Stat the semaphore Quadlet container unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/semaphore.container
      register: semaphore_container_unit

    - name: Assert semaphore.container unit exists with correct mode
      ansible.builtin.assert:
        that:
          - semaphore_container_unit.stat.exists
          - semaphore_container_unit.stat.mode == '0644'

    - name: Stat the semaphore-postgres Quadlet container unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/semaphore-postgres.container
      register: semaphore_postgres_container_unit

    - name: Assert semaphore-postgres.container unit exists with correct mode
      ansible.builtin.assert:
        that:
          - semaphore_postgres_container_unit.stat.exists
          - semaphore_postgres_container_unit.stat.mode == '0644'

    - name: Stat the semaphore Quadlet network unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/semaphore.network
      register: semaphore_network_unit

    - name: Assert semaphore.network unit exists
      ansible.builtin.assert:
        that:
          - semaphore_network_unit.stat.exists

    - name: Read semaphore.container unit
      ansible.builtin.slurp:
        src: /etc/containers/systemd/semaphore.container
      register: semaphore_container_contents

    - name: Assert semaphore.container has expected hostname, image, and networks
      vars:
        rendered: "{{ semaphore_container_contents.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'semaphore.test.local' in rendered"
          - "'semaphoreui/semaphore:latest' in rendered"
          - "'proxy_network.network' in rendered"
          - "'semaphore.network' in rendered"
