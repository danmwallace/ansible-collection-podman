# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Deploy IT-Tools developer utility suite as a Podman Quadlet on Fedora.
    options:
      it_tools_hostname:
        type: str
        required: true
        description: Hostname for the IT-Tools web interface (e.g. it-tools.example.com).
      it_tools_data_dir:
        type: str
        default: /opt/podman/it-tools
        description: Host directory for IT-Tools data files.
      it_tools_version:
        type: str
        required: false
        default: "2024.10.22-7ca5933"
        description: Image tag for the it-tools container image.
