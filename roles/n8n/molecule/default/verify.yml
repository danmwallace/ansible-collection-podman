---
- name: Verify
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Stat the n8n Quadlet container unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/n8n.container
      register: n8n_container_unit

    - name: Assert n8n.container unit exists with correct permissions
      ansible.builtin.assert:
        that:
          - n8n_container_unit.stat.exists
          - n8n_container_unit.stat.mode == '0644'

    - name: Stat the n8n-postgres Quadlet container unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/n8n-postgres.container
      register: n8n_postgres_container_unit

    - name: Assert n8n-postgres.container unit exists with correct permissions
      ansible.builtin.assert:
        that:
          - n8n_postgres_container_unit.stat.exists
          - n8n_postgres_container_unit.stat.mode == '0644'

    - name: Stat the n8n Quadlet network unit
      ansible.builtin.stat:
        path: /etc/containers/systemd/n8n.network
      register: n8n_network_unit

    - name: Assert n8n.network unit exists
      ansible.builtin.assert:
        that:
          - n8n_network_unit.stat.exists

    - name: Read n8n.container unit
      ansible.builtin.slurp:
        src: /etc/containers/systemd/n8n.container
      register: n8n_container_contents

    - name: Assert n8n.container has expected image, hostname, and networks
      vars:
        rendered: "{{ n8n_container_contents.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'n8n.test.local' in rendered"
          - "'n8nio/n8n:latest' in rendered"
          - "'proxy_network.network' in rendered"
          - "'n8n.network' in rendered"

    - name: Read n8n-postgres.container unit
      ansible.builtin.slurp:
        src: /etc/containers/systemd/n8n-postgres.container
      register: n8n_postgres_container_contents

    - name: Assert n8n-postgres.container has expected image and network
      vars:
        rendered: "{{ n8n_postgres_container_contents.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'postgres:15' in rendered"
          - "'n8n.network' in rendered"

    - name: Stat the n8n data directory
      ansible.builtin.stat:
        path: /opt/podman/n8n/data
      register: n8n_data_dir

    - name: Assert n8n data directory exists
      ansible.builtin.assert:
        that:
          - n8n_data_dir.stat.exists
          - n8n_data_dir.stat.isdir
