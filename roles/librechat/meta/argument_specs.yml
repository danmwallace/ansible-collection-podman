---
argument_specs:
  main:
    short_description: Deploy LibreChat and its dependencies as Podman Quadlet units on Fedora.
    options:
      librechat_hostname:
        type: str
        required: true
        description: Hostname for the LibreChat web interface (e.g. chat.example.com).
      librechat_data_dir:
        type: str
        default: /opt/podman/librechat
        description: Host base directory for all LibreChat data volumes.
      librechat_port:
        type: int
        default: 3080
        description: Port the LibreChat API container listens on (used for Traefik load balancer config).
      librechat_api_image:
        type: str
        default: ghcr.io/danny-avila/librechat:latest
        description: Container image for the LibreChat API service.
      librechat_mongo_uri:
        type: str
        required: true
        description: MongoDB connection URI for LibreChat. Store in Ansible Vault.
      librechat_meilisearch_image:
        type: str
        default: getmeili/meilisearch:v1.7.3
        description: Container image for the Meilisearch service.
      librechat_meili_master_key:
        type: str
        required: true
        description: Master key for Meilisearch authentication. Store in Ansible Vault.
      librechat_meili_host:
        type: str
        default: "http://librechat-meilisearch:7700"
        description: >
          URL for the Meilisearch service as seen from the LibreChat API container.
          Defaults to the Podman container name on the librechat network.
      librechat_vectordb_image:
        type: str
        default: ankane/pgvector:latest
        description: Container image for the vectordb (pgvector/Postgres) service.
      librechat_vectordb_postgres_db:
        type: str
        default: mydatabase
        description: Postgres database name for the vectordb service.
      librechat_vectordb_postgres_user:
        type: str
        default: myuser
        description: Postgres username for the vectordb service.
      librechat_vectordb_postgres_password:
        type: str
        required: true
        description: Postgres password for the vectordb service. Store in Ansible Vault.
      librechat_jwt_secret:
        type: str
        required: true
        description: >
          Secret key for JWT session token signing. Generate with `openssl rand -hex 32`.
          Store in Ansible Vault.
      librechat_jwt_refresh_secret:
        type: str
        required: true
        description: >
          Secret key for JWT refresh token signing (must differ from librechat_jwt_secret).
          Generate with `openssl rand -hex 32`. Store in Ansible Vault.
      librechat_creds_key:
        type: str
        required: true
        description: >
          32-byte hex key for credential encryption at rest.
          Generate with `openssl rand -hex 32`. Store in Ansible Vault.
      librechat_creds_iv:
        type: str
        required: true
        description: >
          16-byte hex IV for credential encryption at rest.
          Generate with `openssl rand -hex 16`. Store in Ansible Vault.
      librechat_ragapi_image:
        type: str
        default: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
        description: Container image for the LibreChat RAG API service.
      librechat_rag_port:
        type: int
        default: 8000
        description: Port the RAG API service listens on. Used to set RAG_PORT in the env file.
      librechat_rag_api_url:
        type: str
        default: "http://librechat-rag-api:8000"
        description: >
          URL for the RAG API service as seen from the LibreChat API container.
          Defaults to the Podman container name on the librechat network.
      librechat_obsidian_mount_enabled:
        type: bool
        default: false
        description: When true, bind-mounts the Obsidian vault path into the api container.
      librechat_obsidian_mount_path:
        type: str
        default: ""
        description: >
          Absolute path to the Obsidian vault on the host. Only used when
          librechat_obsidian_mount_enabled is true.
      librechat_allow_social_login:
        type: bool
        default: false
        description: Enable OAuth/social login providers (Google, OpenID, etc.).
      librechat_allow_social_registration:
        type: bool
        default: false
        description: Allow new user registration via social login providers.
      librechat_allow_email_login:
        type: bool
        default: false
        description: Enable local email/password login.
      librechat_allow_registration:
        type: bool
        default: false
        description: Allow new user self-registration via email/password.
      librechat_anthropic_api_key:
        type: str
        default: ""
        description: Anthropic API key. Store in Ansible Vault.
      librechat_anthropic_models:
        type: str
        default: ""
        description: Comma-separated list of Anthropic models to offer.
      librechat_endpoints:
        type: str
        default: ""
        description: >
          Comma-separated list of enabled endpoints.
          E.g. "azureOpenAI,anthropic,agents,azureAssistants".
      librechat_app_title:
        type: str
        default: LibreChat
        description: Application title shown in the browser tab and header.
      librechat_openid_client_id:
        type: str
        default: ""
        description: OpenID Connect / Entra ID application (client) ID.
      librechat_openid_client_secret:
        type: str
        default: ""
        description: OpenID Connect / Entra ID client secret. Store in Ansible Vault.
      librechat_openid_issuer:
        type: str
        default: ""
        description: OpenID Connect issuer URL (e.g. https://login.microsoftonline.com/<tenant>/v2.0/).
      librechat_openid_session_secret:
        type: str
        default: ""
        description: Session secret for the OpenID Connect strategy. Store in Ansible Vault.
      librechat_openid_scope:
        type: str
        default: "openid profile email offline_access"
        description: Space-separated OpenID Connect scopes to request.
      librechat_openid_button_label:
        type: str
        default: ""
        description: Label shown on the OpenID Connect login button (e.g. "Sign-in with Microsoft").
      librechat_openid_image_url:
        type: str
        default: ""
        description: URL of the icon shown on the OpenID Connect login button.
      librechat_openid_callback_url:
        type: str
        default: /oauth/openid/callback
        description: Callback path for the OpenID Connect provider redirect.
      librechat_openid_required_role:
        type: str
        default: ""
        description: >
          Group/role ID that a user must have in the ID token to be granted access.
          Leave blank to allow all authenticated users.
      librechat_openid_required_role_token_kind:
        type: str
        default: ""
        description: Token kind to inspect for the required role ("id" or "access").
      librechat_openid_required_role_parameter_path:
        type: str
        default: ""
        description: JSON path in the token where group/role IDs are found (e.g. "groups").
      librechat_google_client_id:
        type: str
        default: ""
        description: Google OAuth 2.0 client ID.
      librechat_google_client_secret:
        type: str
        default: ""
        description: Google OAuth 2.0 client secret. Store in Ansible Vault.
      librechat_google_callback_url:
        type: str
        default: /oauth/google/callback
        description: Callback path for the Google OAuth redirect.
      librechat_hermes_personal_enabled:
        type: bool
        default: false
        description: When true, registers Hermes Personal as a custom endpoint in librechat.yaml.
      librechat_hermes_personal_url:
        type: str
        default: ""
        description: Base URL of the Hermes Personal gateway API (e.g. https://hermes-api-ai01.wallace.boston).
      librechat_hermes_personal_api_key:
        type: str
        default: ""
        no_log: true
        description: Bearer token for the Hermes Personal API. Must match hermes_api_server_key on ai01. Store in Ansible Vault.
      librechat_hermes_infra_enabled:
        type: bool
        default: false
        description: When true, registers Hermes Infra as a custom endpoint in librechat.yaml.
      librechat_hermes_infra_url:
        type: str
        default: ""
        description: Base URL of the Hermes Infra gateway API (e.g. https://hermes-api-ai-master.wallace.boston).
      librechat_hermes_infra_api_key:
        type: str
        default: ""
        no_log: true
        description: Bearer token for the Hermes Infra API. Must match hermes_api_server_key on ai-master. Store in Ansible Vault.
