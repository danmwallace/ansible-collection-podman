---
- name: Restart grimmory-db
  ansible.builtin.systemd:
    name: grimmory-db.service
    state: restarted
    daemon_reload: true
  become: true
  tags: [molecule-notest]
  register: _grimmory_db_restart_result
  # "Could not find the requested service" fires in Molecule because the
  # Quadlet unit isn't loaded (daemon-reload is molecule-notest). Suppress
  # that specific error so Molecule passes; any other failure still surfaces.
  failed_when:
    - _grimmory_db_restart_result is failed
    - "'Could not find the requested service' not in (_grimmory_db_restart_result.msg | default(''))"

- name: Restart grimmory
  ansible.builtin.systemd:
    name: grimmory.service
    state: restarted
    daemon_reload: true
  become: true
  tags: [molecule-notest]
  register: _grimmory_restart_result
  failed_when:
    - _grimmory_restart_result is failed
    - "'Could not find the requested service' not in (_grimmory_restart_result.msg | default(''))"
