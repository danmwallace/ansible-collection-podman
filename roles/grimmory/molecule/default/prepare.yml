---
- name: Prepare molecule instance
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Install Python 3 and sudo
      ansible.builtin.raw: dnf install -y python3 sudo
      changed_when: false

    - name: Create /etc/containers/systemd directory
      ansible.builtin.raw: mkdir -p /etc/containers/systemd
      changed_when: false
